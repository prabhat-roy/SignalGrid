# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: signalgrid
  storage:
    s3: { endpoint: http://minio.signalgrid.svc:9000, region: us-east-1, bucket: signalgrid-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.signalgrid.internal }] }
