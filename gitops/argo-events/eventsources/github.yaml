apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata: { name: github, namespace: argo-events }
spec:
  service: { ports: [{ port: 12000, targetPort: 12000 }] }
  github:
    signalgrid:
      repositories: [{ owner: prabhat-roy, names: [SignalGrid] }]
      webhook: { endpoint: /push, port: '12000', method: POST, url: https://argo-events.signalgrid.internal }
      events: [push, pull_request]
      apiToken: { name: github-token, key: token }
      webhookSecret: { name: github-webhook, key: secret }
