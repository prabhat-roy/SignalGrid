apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: signalgrid-tools
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/prabhat-roy/SignalGrid.git
        revision: HEAD
        directories:
          - { path: security/* }
          - { path: observability/* }
          - { path: messaging/* }
          - { path: networking/* }
          - { path: databases/* }
          - { path: data/* }
          - { path: supply-chain/* }
          - { path: sustainability/* }
          - { path: edge/* }
          - { path: streaming/* }
          - { path: workflow/* }
          - { path: registry/charts/* }
          - { path: domain-oss/* }
  template:
    metadata:
      name: "signalgrid-tool-{{path.basename}}"
      labels: { project: signalgrid-tools, area: "{{path[0]}}" }
    spec:
      project: default
      source:
        repoURL: https://github.com/prabhat-roy/SignalGrid.git
        targetRevision: HEAD
        path: "{{path}}"
        helm:
          releaseName: "{{path.basename}}"
          valueFiles: ["values.yaml"]
      destination:
        server: https://kubernetes.default.svc
        namespace: "signalgrid-tools"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
