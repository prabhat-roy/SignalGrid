apiVersion: apps/v1
kind: Deployment
metadata:
  name: revenue-analytics
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: revenue-analytics
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: revenue-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: revenue-analytics, signalgrid.io/domain: analytics }
    spec:
      serviceAccountName: revenue-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: revenue-analytics
          image: harbor.signalgrid.internal/signalgrid/revenue-analytics:latest
          ports: [{ containerPort: 50301, name: http }]
          envFrom: [{ configMapRef: { name: revenue-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
