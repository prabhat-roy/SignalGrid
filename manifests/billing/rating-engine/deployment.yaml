apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-engine
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: rating-engine
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: billing
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: rating-engine } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rating-engine, signalgrid.io/domain: billing }
    spec:
      serviceAccountName: rating-engine
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: rating-engine
          image: harbor.signalgrid.internal/signalgrid/rating-engine:latest
          ports: [{ containerPort: 50101, name: http }]
          envFrom: [{ configMapRef: { name: rating-engine } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
