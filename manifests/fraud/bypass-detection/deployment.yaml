apiVersion: apps/v1
kind: Deployment
metadata:
  name: bypass-detection
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: bypass-detection
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: fraud
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: bypass-detection } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bypass-detection, signalgrid.io/domain: fraud }
    spec:
      serviceAccountName: bypass-detection
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: bypass-detection
          image: harbor.signalgrid.internal/signalgrid/bypass-detection:latest
          ports: [{ containerPort: 50262, name: http }]
          envFrom: [{ configMapRef: { name: bypass-detection } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
