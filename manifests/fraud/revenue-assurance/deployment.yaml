apiVersion: apps/v1
kind: Deployment
metadata:
  name: revenue-assurance
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: revenue-assurance
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: fraud
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: revenue-assurance } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: revenue-assurance, signalgrid.io/domain: fraud }
    spec:
      serviceAccountName: revenue-assurance
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: revenue-assurance
          image: harbor.signalgrid.internal/signalgrid/revenue-assurance:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: revenue-assurance } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
