apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-swap
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: sim-swap
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: fraud
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: sim-swap } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sim-swap, signalgrid.io/domain: fraud }
    spec:
      serviceAccountName: sim-swap
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: sim-swap
          image: harbor.signalgrid.internal/signalgrid/sim-swap:latest
          ports: [{ containerPort: 50263, name: http }]
          envFrom: [{ configMapRef: { name: sim-swap } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
