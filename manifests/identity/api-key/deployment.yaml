apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-key
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: api-key
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: api-key } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: api-key, signalgrid.io/domain: identity }
    spec:
      serviceAccountName: api-key
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: api-key
          image: harbor.signalgrid.internal/signalgrid/api-key:latest
          ports: [{ containerPort: 50024, name: http }]
          envFrom: [{ configMapRef: { name: api-key } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50024 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50024 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
