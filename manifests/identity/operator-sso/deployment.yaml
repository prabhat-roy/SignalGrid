apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-sso
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: operator-sso
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: operator-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: operator-sso, signalgrid.io/domain: identity }
    spec:
      serviceAccountName: operator-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: operator-sso
          image: harbor.signalgrid.internal/signalgrid/operator-sso:latest
          ports: [{ containerPort: 50022, name: http }]
          envFrom: [{ configMapRef: { name: operator-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
