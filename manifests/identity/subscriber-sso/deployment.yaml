apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscriber-sso
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: subscriber-sso
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: subscriber-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: subscriber-sso, signalgrid.io/domain: identity }
    spec:
      serviceAccountName: subscriber-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: subscriber-sso
          image: harbor.signalgrid.internal/signalgrid/subscriber-sso:latest
          ports: [{ containerPort: 50021, name: http }]
          envFrom: [{ configMapRef: { name: subscriber-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
