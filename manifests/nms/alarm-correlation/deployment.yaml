apiVersion: apps/v1
kind: Deployment
metadata:
  name: alarm-correlation
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: alarm-correlation
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: nms
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: alarm-correlation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: alarm-correlation, signalgrid.io/domain: nms }
    spec:
      serviceAccountName: alarm-correlation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: alarm-correlation
          image: harbor.signalgrid.internal/signalgrid/alarm-correlation:latest
          ports: [{ containerPort: 50143, name: http }]
          envFrom: [{ configMapRef: { name: alarm-correlation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
