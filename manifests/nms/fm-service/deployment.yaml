apiVersion: apps/v1
kind: Deployment
metadata:
  name: fm-service
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: fm-service
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: nms
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: fm-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: fm-service, signalgrid.io/domain: nms }
    spec:
      serviceAccountName: fm-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: fm-service
          image: harbor.signalgrid.internal/signalgrid/fm-service:latest
          ports: [{ containerPort: 50140, name: http }]
          envFrom: [{ configMapRef: { name: fm-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50140 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50140 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
