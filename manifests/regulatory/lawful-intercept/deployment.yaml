apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawful-intercept
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: lawful-intercept
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: regulatory
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: lawful-intercept } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: lawful-intercept, signalgrid.io/domain: regulatory }
    spec:
      serviceAccountName: lawful-intercept
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: lawful-intercept
          image: harbor.signalgrid.internal/signalgrid/lawful-intercept:latest
          ports: [{ containerPort: 50280, name: http }]
          envFrom: [{ configMapRef: { name: lawful-intercept } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50280 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50280 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
