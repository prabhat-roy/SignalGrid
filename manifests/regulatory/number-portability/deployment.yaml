apiVersion: apps/v1
kind: Deployment
metadata:
  name: number-portability
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: number-portability
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: regulatory
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: number-portability } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: number-portability, signalgrid.io/domain: regulatory }
    spec:
      serviceAccountName: number-portability
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: number-portability
          image: harbor.signalgrid.internal/signalgrid/number-portability:latest
          ports: [{ containerPort: 50281, name: http }]
          envFrom: [{ configMapRef: { name: number-portability } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50281 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
