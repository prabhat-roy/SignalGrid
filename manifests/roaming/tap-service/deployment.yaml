apiVersion: apps/v1
kind: Deployment
metadata:
  name: tap-service
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: tap-service
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: roaming
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: tap-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tap-service, signalgrid.io/domain: roaming }
    spec:
      serviceAccountName: tap-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: tap-service
          image: harbor.signalgrid.internal/signalgrid/tap-service:latest
          ports: [{ containerPort: 50180, name: http }]
          envFrom: [{ configMapRef: { name: tap-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
