apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-billing
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: content-billing
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: vas
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: content-billing } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: content-billing, signalgrid.io/domain: vas }
    spec:
      serviceAccountName: content-billing
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: content-billing
          image: harbor.signalgrid.internal/signalgrid/content-billing:latest
          ports: [{ containerPort: 50323, name: http }]
          envFrom: [{ configMapRef: { name: content-billing } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50323 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50323 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
