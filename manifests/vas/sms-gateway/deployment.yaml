apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-gateway
  namespace: signalgrid
  labels:
    app.kubernetes.io/name: sms-gateway
    app.kubernetes.io/part-of: signalgrid
    signalgrid.io/domain: vas
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: sms-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sms-gateway, signalgrid.io/domain: vas }
    spec:
      serviceAccountName: sms-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: sms-gateway
          image: harbor.signalgrid.internal/signalgrid/sms-gateway:latest
          ports: [{ containerPort: 50320, name: http }]
          envFrom: [{ configMapRef: { name: sms-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50320 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50320 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
