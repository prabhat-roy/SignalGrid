apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: signalgrid-cross-domain-bff-only, namespace: signalgrid }
spec:
  endpointSelector: { matchLabels: { app.kubernetes.io/part-of: signalgrid } }
  ingress:
    - fromEndpoints:
        - matchLabels: { app.kubernetes.io/name: api-gateway }
        - matchLabels: { app.kubernetes.io/name: ops-bff }
        - matchLabels: { app.kubernetes.io/name: customer-bff }
        - matchLabels: { app.kubernetes.io/name: trader-bff }
