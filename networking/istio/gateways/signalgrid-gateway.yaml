apiVersion: networking.istio.io/v1
kind: Gateway
metadata: { name: signalgrid, namespace: istio-system }
spec:
  selector: { istio: ingressgateway }
  servers:
    - port: { number: 443, name: https, protocol: HTTPS }
      tls: { mode: SIMPLE, credentialName: signalgrid-tls }
      hosts: ["api.signalgrid.com","ops.signalgrid.com"]
