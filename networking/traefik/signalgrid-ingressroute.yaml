apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: signalgrid, namespace: signalgrid }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`api.signalgrid.com`)
      kind: Rule
      services: [{ name: api-gateway, port: 50000 }]
      middlewares: [{ name: signalgrid-rate-limit }]
  tls: { secretName: signalgrid-tls }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: signalgrid-rate-limit, namespace: signalgrid }
spec:
  rateLimit: { average: 100, burst: 200 }
