global: { resolve_timeout: 5m }

route:
  receiver: signalgrid-default
  group_by: [app, severity]
  routes:
    - { matchers: [severity="critical"], receiver: pagerduty, continue: true }
    - { matchers: [team=~".+"], receiver: slack-team, group_by: [team] }

receivers:
  - { name: signalgrid-default, slack_configs: [{ api_url: ${SLACK_WEBHOOK}, channel: '#signalgrid-alerts' }] }
  - { name: pagerduty,        pagerduty_configs: [{ service_key: ${PAGERDUTY_KEY} }] }
  - { name: slack-team,       slack_configs: [{ api_url: ${SLACK_WEBHOOK}, channel: '#signalgrid-{{ .CommonLabels.team }}' }] }
