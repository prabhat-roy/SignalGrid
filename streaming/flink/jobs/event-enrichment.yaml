apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: signalgrid-event-enrichment, namespace: signalgrid }
spec:
  deploymentName: signalgrid-flink
  job:
    jarURI: s3://signalgrid-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "signalgrid.cdc.public.events", "--sink-topic", "signalgrid.events.enriched"]
