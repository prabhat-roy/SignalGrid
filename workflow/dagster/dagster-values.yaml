dagsterWebserver: { replicaCount: 2 }
dagsterDaemon:    { enabled: true }
postgresql: { enabled: true }
runLauncher:
  type: K8sRunLauncher
  config:
    k8sRunLauncher: { jobNamespace: signalgrid-dagster, imagePullSecrets: [{ name: harbor-pull }] }
ingress:
  enabled: true
  dagsterWebserver: { host: dagster.signalgrid.internal }
